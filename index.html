<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculadora MKT - QA Industrial</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
    :root {
        --bg-dark: #070b14;
        --bg-panel: #111827;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --neon-blue: #0ea5e9;
        --neon-red: #f43f5e;
        --neon-green: #10b981;
        --neon-yellow: #eab308;
        --border-color: #1e293b;
    }

    body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 15px; box-sizing: border-box; }
    h2, h3 { text-align: center; color: var(--neon-blue); margin-top: 0; text-shadow: 0 0 10px rgba(14, 165, 233, 0.3); }

    .dapp-container { max-width: 800px; margin: 0 auto; background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
    
    .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.4); }
    .hub-back-btn { background: rgba(14, 165, 233, 0.1); color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 0.9em; transition: 0.3s; display: flex; align-items: center; }
    .hub-back-btn:hover { background: var(--neon-blue); color: #fff; box-shadow: 0 0 15px var(--neon-blue); }

    .calc-zone {
        background-image: linear-gradient(rgba(30, 41, 59, 0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(30, 41, 59, 0.5) 1px, transparent 1px);
        background-size: 20px 20px;
        padding: 25px;
    }

    .control-panel { background: #0f172a; border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
    .control-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
    
    label { font-size: 0.9em; color: var(--text-muted); font-weight: bold; }
    input[type="number"] { background: #030712; border: 1px solid #334155; color: var(--neon-blue); padding: 10px; border-radius: 6px; font-family: monospace; font-size: 1.1em; outline: none; transition: 0.3s; }
    input[type="number"]:focus { border-color: var(--neon-blue); box-shadow: 0 0 8px rgba(14, 165, 233, 0.3); }
    
    select { background: #030712; border: 1px solid #334155; color: var(--neon-blue); padding: 10px; border-radius: 6px; font-family: monospace; font-size: 1em; outline: none; cursor: pointer; transition: 0.3s; }

    .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--neon-blue); box-shadow: 0 0 8px var(--neon-blue); }
    input:checked + .slider:before { transform: translateX(26px); }

    .limits-container { display: flex; gap: 10px; align-items: center; opacity: 0.3; pointer-events: none; transition: 0.3s; }
    .limits-container.active { opacity: 1; pointer-events: all; }

    /* ZONA DE INPUTS (AJUSTADA PARA EVITAR SUPERPOSICIÓN) */
    .data-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; max-height: 400px; overflow-y: auto; padding-right: 10px; }
    
    /* Modo Bloques */
    .data-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #030712; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; align-items: center; width: 100%; box-sizing: border-box; }
    .input-group { display: flex; align-items: center; width: 100%; }
    .input-tag { background: #1e293b; color: var(--text-muted); font-size: 0.8em; padding: 10px; font-family: monospace; border: 1px solid #334155; border-right: none; border-radius: 4px 0 0 4px; white-space: nowrap; min-width: 70px; text-align: center; }
    .data-row input { width: 100%; border-radius: 0 4px 4px 0; border: 1px solid #334155; box-sizing: border-box; }

    /* Modo Individual */
    .temp-input-wrapper { display: flex; align-items: center; background: #030712; border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; width: 100%; box-sizing: border-box; margin-bottom: 2px; }
    .temp-input-label { background: #1e293b; color: var(--text-muted); font-size: 0.75em; padding: 12px 15px; font-family: monospace; border-right: 1px solid var(--border-color); min-width: 50px; text-align: center; }
    .temp-input-wrapper input { width: 100%; border: none !important; border-radius: 0 !important; color: #fff !important; padding: 10px; }

    .btn-calc { background: rgba(14, 165, 233, 0.2); border: 1px solid var(--neon-blue); color: var(--neon-blue); width: 100%; padding: 18px; font-size: 1.1em; font-weight: bold; font-family: monospace; letter-spacing: 2px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
    .btn-calc:hover { background: var(--neon-blue); color: #fff; box-shadow: 0 0 20px var(--neon-blue); }

    .lcd-screen { background: #030712; border: 2px solid #334155; border-radius: 12px; padding: 25px; margin-top: 25px; text-align: center; position: relative; transition: 0.3s; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
    .lcd-screen.pass { border-color: var(--neon-green); box-shadow: inset 0 0 30px rgba(16, 185, 129, 0.1), 0 0 15px rgba(16, 185, 129, 0.2); }
    .lcd-screen.fail { border-color: var(--neon-red); box-shadow: inset 0 0 30px rgba(244, 63, 94, 0.1), 0 0 15px rgba(244, 63, 94, 0.2); }
    
    .lcd-title { font-family: monospace; color: var(--text-muted); letter-spacing: 2px; font-size: 0.9em; margin-bottom: 10px; }
    .lcd-value { font-family: 'Courier New', Courier, monospace; font-size: 3.5em; font-weight: bold; color: var(--text-main); text-shadow: 0 0 10px rgba(255,255,255,0.2); margin: 0; line-height: 1; transition: 0.3s; }
    .lcd-screen.pass .lcd-value { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }
    .lcd-screen.fail .lcd-value { color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red); }
    
    .lcd-status { font-family: monospace; font-size: 1.2em; font-weight: bold; margin-top: 15px; letter-spacing: 2px; height: 20px; }
    .lcd-screen.pass .lcd-status { color: var(--neon-green); }
    .lcd-screen.fail .lcd-status { color: var(--neon-red); }

    .secondary-stats { display: flex; justify-content: space-around; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #334155; }
    .stat-box { display: flex; flex-direction: column; align-items: center; }
    .stat-label { font-size: 0.75em; color: var(--text-muted); font-family: monospace; }
    .stat-val { font-size: 1.2em; color: var(--neon-yellow); font-family: monospace; font-weight: bold; }

</style>
</head>
<body>

<div class="dapp-container">
    <div class="header-bar">
        <h3 style="margin:0; font-size: 1.1em; color:#f8fafc; text-shadow:none; font-family: monospace;">TOOL <span style="color:var(--text-muted); font-weight:normal;">| MKT CALCULATOR</span></h3>
        <a href="https://alexis10r.github.io/hub/" class="hub-back-btn">← Hub Central</a>
    </div>

    <div class="calc-zone">
        <div class="control-panel">
            <div class="control-row">
                <label style="width: 150px;">Modo de Ingreso:</label>
                <select id="calc-mode" onchange="switchMode()">
                    <option value="blocks">Bloques de Tiempo (Datalogger)</option>
                    <option value="individual">Lecturas Individuales (Bitácora)</option>
                </select>
            </div>

            <div class="control-row" style="border-top: 1px solid var(--border-color); padding-top: 15px;">
                <label id="label-n" style="width: 200px;">Bloques de Temp. (Filas):</label>
                <input type="number" id="n-datos" min="1" max="100" value="2" onchange="generateInputs()" style="width:80px;">
            </div>
            
            <div class="control-row" style="border-top: 1px solid var(--border-color); padding-top: 15px;">
                <label style="width: 150px;">Evaluar Límites BPF:</label>
                <label class="switch">
                    <input type="checkbox" id="toggle-limits" onchange="toggleLimitsUI()">
                    <span class="slider"></span>
                </label>
                
                <div class="limits-container" id="limits-box">
                    <input type="number" id="limit-min" placeholder="Min °C" step="0.1" style="width: 100px;">
                    <span style="color:var(--text-muted); font-family: monospace;">y/o</span>
                    <input type="number" id="limit-max" placeholder="Max °C" step="0.1" style="width: 100px;">
                </div>
            </div>
        </div>

        <label style="font-family:monospace; color:var(--neon-blue);">[ MATRIZ DE DATOS TÉRMICOS ]</label>
        <div class="data-grid" id="data-inputs"></div>

        <button class="btn-calc" onclick="calculateMKT()">EJECUTAR CÁLCULO MKT</button>

        <div class="lcd-screen" id="lcd-display">
            <div class="lcd-title">TEMPERATURA CINÉTICA MEDIA (MKT)</div>
            <div class="lcd-value" id="mkt-result">--.--°C</div>
            <div class="lcd-status" id="mkt-status">ESPERANDO DATOS...</div>
            
            <div class="secondary-stats">
                <div class="stat-box">
                    <span class="stat-label">PROMEDIO SIMPLE</span>
                    <span class="stat-val" id="arith-result">--.--°C</span>
                </div>
                <div class="stat-box" id="stat-count-box">
                    <span class="stat-label" id="label-count-result">TIEMPO TOTAL (Hrs)</span>
                    <span class="stat-val" id="n-result">0</span>
                </div>
            </div>
        </div>
        
        <p style="font-size:0.75em; text-align:left; margin-top:20px; font-family:monospace;">*Ecuación de Arrhenius aplicada según USP &lt;1079&gt;.</p>
    </div>
</div>

<script>
    window.onload = generateInputs;

    function switchMode() {
        const mode = document.getElementById('calc-mode').value;
        const labelN = document.getElementById('label-n');
        const labelCountResult = document.getElementById('label-count-result');
        const nInput = document.getElementById('n-datos');
        
        if (mode === 'blocks') {
            labelN.innerText = 'Bloques de Temp. (Filas):';
            labelCountResult.innerText = 'TIEMPO TOTAL (Hrs)';
            if (parseInt(nInput.value) > 50) nInput.value = 50;
        } else {
            labelN.innerText = 'Cantidad de Lecturas (n):';
            labelCountResult.innerText = 'LECTURAS VALIDADAS';
            if (parseInt(nInput.value) < 2) nInput.value = 3; 
        }
        resetLCD();
        generateInputs();
    }

    function generateInputs() {
        let n = parseInt(document.getElementById('n-datos').value);
        const mode = document.getElementById('calc-mode').value;
        let container = document.getElementById('data-inputs');
        let html = '';
        
        for(let i=0; i<n; i++) {
            if (mode === 'blocks') {
                html += `
                    <div class="data-row">
                        <div class="input-group">
                            <div class="input-tag">Temp. °C</div>
                            <input type="number" class="temp-val" step="0.1" placeholder="Ej. 5">
                        </div>
                        <div class="input-group">
                            <div class="input-tag">Duración</div>
                            <input type="number" class="time-val" step="0.1" placeholder="Hrs">
                        </div>
                    </div>`;
            } else {
                html += `
                    <div class="temp-input-wrapper">
                        <div class="temp-input-label">T${i+1}</div>
                        <input type="number" class="temp-val" step="0.1" placeholder="°C">
                    </div>`;
            }
        }
        container.innerHTML = html;
    }

    function toggleLimitsUI() {
        document.getElementById('limits-box').classList.toggle('active', document.getElementById('toggle-limits').checked);
    }

    function resetLCD() {
        document.getElementById('lcd-display').className = 'lcd-screen';
        document.getElementById('mkt-result').innerText = '--.--°C';
        document.getElementById('arith-result').innerText = '--.--°C';
        document.getElementById('n-result').innerText = '0';
        document.getElementById('mkt-status').innerText = 'ESPERANDO DATOS...';
    }

    function calculateMKT() {
        const mode = document.getElementById('calc-mode').value;
        const tempInputs = document.querySelectorAll('.temp-val');
        let sumExp = 0, sumArith = 0, denominator = 0;

        if (mode === 'blocks') {
            const timeInputs = document.querySelectorAll('.time-val');
            tempInputs.forEach((inp, i) => {
                let t = parseFloat(inp.value), h = parseFloat(timeInputs[i].value);
                if(!isNaN(t) && !isNaN(h) && h > 0) {
                    sumExp += (Math.exp(-10000 / (t + 273.15))) * h;
                    sumArith += (t * h); denominator += h;
                }
            });
        } else {
            tempInputs.forEach(inp => {
                let t = parseFloat(inp.value);
                if(!isNaN(t)) {
                    sumExp += Math.exp(-10000 / (t + 273.15));
                    sumArith += t; denominator++;
                }
            });
        }

        if(denominator <= 0) return;

        let mktC = (10000 / (-Math.log(sumExp / denominator))) - 273.15;
        document.getElementById('mkt-result').innerText = mktC.toFixed(2) + '°C';
        document.getElementById('arith-result').innerText = (sumArith / denominator).toFixed(2) + '°C';
        document.getElementById('n-result').innerText = denominator.toFixed(denominator % 1 === 0 ? 0 : 1);

        const useLimits = document.getElementById('toggle-limits').checked;
        if(useLimits) {
            let min = parseFloat(document.getElementById('limit-min').value), max = parseFloat(document.getElementById('limit-max').value);
            let passed = (isNaN(min) || mktC >= min) && (isNaN(max) || mktC <= max);
            document.getElementById('lcd-display').className = 'lcd-screen ' + (passed ? 'pass' : 'fail');
            document.getElementById('mkt-status').innerText = passed ? '[ APROBADO: DENTRO DE ESPECIFICACIÓN ]' : '[ ALERTA BPF: FUERA DE ESPECIFICACIÓN ]';
            document.getElementById('mkt-status').style.color = passed ? 'var(--neon-green)' : 'var(--neon-red)';
        } else {
            document.getElementById('mkt-status').innerText = 'CÁLCULO COMPLETADO';
            document.getElementById('mkt-status').style.color = 'var(--neon-blue)';
        }
    }
</script>
</body>
</html>
